<!DOCTYPE html>
<html>
<head>
    <title>Damazon</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="market">

    <!-- Navbar -->
    <div class="navbar">
        <div class="logo">Damazon</div>

        <form method="GET" action="{{ url_for('damazon') }}">
            <input type="text" name="search" placeholder="Search Damazon...">
            <button type="submit">Search</button>
        </form>

        <div>
            <a href="{{ url_for('cart') }}">Cart</a>
            <a href="{{ url_for('my_orders') }}">Orders</a>
            <a href="{{ url_for('logout') }}">Logout</a>
        </div>
    </div>

    <!-- Product Section -->
    <div class="container">
        <div class="grid">
            {% for product in products %}
                <div class="card">

                    {% if product.image %}
                        <img src="{{ url_for('static', filename='uploads/' + product.image) }}">
                    {% endif %}

                    <h3>{{ product.name }}</h3>

                    <p class="price">₹{{ product.price }}</p>

                    <p>Stock: {{ product.stock }}</p>
                    <p style="font-size:13px; color:gray;">
                        Sold by {{ product.seller.username }}
                    </p>

                    {% if product.stock > 0 %}
                        <a href="{{ url_for('add_to_cart', product_id=product.id) }}">
                            <button class="btn-cart">Add to Cart</button>
                        </a>
                    {% else %}
                        <p style="color:red;"><strong>Out of Stock</strong></p>
                    {% endif %}

                </div>
            {% endfor %}
        </div>
    </div>

    <!-- ================= FLOATING CHATBOT ================= -->

    <!-- Toggle Button -->
    <div class="chat-toggle" onclick="toggleChat()">
        🤖
    </div>

    <!-- Chat Window -->
    <div id="chatbot" class="chatbot hidden">

        <div class="chat-header">
            Damazon AI
            <span onclick="toggleChat()" class="close-btn">✖</span>
        </div>

        <div id="chat-messages" class="chat-messages"></div>

        <div class="chat-input-area">
            <input type="text" id="chat-input"
                   placeholder="Ask about products...">
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>

    <script>
        function toggleChat() {
            document.getElementById("chatbot").classList.toggle("hidden");
        }

        function sendMessage() {

            const input = document.getElementById("chat-input");
            const message = input.value.trim();
            if (!message) return;

            const chatBox = document.getElementById("chat-messages");

            // Show user message
            chatBox.innerHTML += `
                <div class="msg user">${message}</div>
            `;

            chatBox.scrollTop = chatBox.scrollHeight;

            fetch("/chatbot", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ message: message })
            })
            .then(res => res.json())
            .then(data => {
                chatBox.innerHTML += `
                    <div class="msg ai">${data.reply}</div>
                `;
                chatBox.scrollTop = chatBox.scrollHeight;
            });

            input.value = "";
        }
    </script>

</body>
</html>
